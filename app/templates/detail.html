<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Details - Support CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">
    
    <!-- Navbar -->
    <nav class="bg-blue-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="window.location.href='/'">
                    <i class="fa-solid fa-headset text-2xl mr-2"></i>
                    <span class="font-bold text-xl">Support CRM</span>
                </div>
                <div>
                    <a href="/" class="text-blue-100 hover:text-white flex items-center"><i class="fa-solid fa-arrow-left mr-1"></i> Back to Dashboard</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div id="loading" class="text-center py-10">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500"></i>
            <p class="mt-2 text-gray-500">Loading ticket details...</p>
        </div>

        <div id="ticketContent" class="hidden">
            <!-- Header Section -->
            <div class="bg-white shadow rounded-lg mb-6 overflow-hidden">
                <div class="px-6 py-5 border-b border-gray-200 flex flex-col md:flex-row justify-between items-start md:items-center">
                    <div>
                        <div class="flex items-center space-x-3">
                            <h2 class="text-2xl font-bold text-gray-900" id="ticketSubject">Ticket Subject</h2>
                            <span id="ticketStatusBadge" class="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">Status</span>
                        </div>
                        <p class="text-sm text-gray-500 mt-1">Ticket ID: <span id="ticketId" class="font-mono text-gray-700">TKT-001</span> • Created on <span id="ticketDate">Date</span></p>
                    </div>
                </div>
                
                <!-- Customer Info -->
                <div class="px-6 py-5 bg-gray-50 flex items-center space-x-4 border-b border-gray-200">
                    <div class="h-10 w-10 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold text-lg" id="customerAvatar">C</div>
                    <div>
                        <p class="text-sm font-medium text-gray-900" id="customerName">Customer Name</p>
                        <p class="text-sm text-gray-500" id="customerEmail">customer@example.com</p>
                    </div>
                </div>

                <!-- Description -->
                <div class="px-6 py-6">
                    <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wider mb-3">Issue Description</h3>
                    <div class="text-gray-800 whitespace-pre-wrap bg-gray-50 p-4 rounded border border-gray-100" id="ticketDescription">Description text goes here.</div>
                </div>
            </div>

            <!-- Update Section -->
            <div class="bg-white shadow rounded-lg overflow-hidden">
                <div class="px-6 py-5 border-b border-gray-200">
                    <h3 class="text-lg font-medium text-gray-900">Update Ticket</h3>
                </div>
                <div class="px-6 py-5">
                    <form id="updateTicketForm" onsubmit="handleUpdateTicket(event)">
                        <div class="mb-4">
                            <label for="status" class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                            <select id="status" class="bg-white border border-gray-300 text-gray-900 text-sm rounded-md focus:ring-blue-500 focus:border-blue-500 block w-full md:w-1/3 p-2.5">
                                <option value="Open">Open</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Closed">Closed</option>
                            </select>
                        </div>
                        
                        <div class="mb-4">
                            <label for="notes" class="block text-sm font-medium text-gray-700 mb-1">Internal Notes</label>
                            <textarea id="notes" rows="4" class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border" placeholder="Add internal notes or updates here..."></textarea>
                        </div>
                        
                        <div class="flex justify-end">
                            <button type="submit" id="updateBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition duration-300 flex items-center">
                                <span>Save Updates</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </main>
    
    <!-- Pass the ticket ID from backend to frontend -->
    <script>
        const CURRENT_TICKET_ID = "{{ ticket_id }}";
    </script>
    <script src="/static/js/detail.js"></script>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

</body>
</html>
